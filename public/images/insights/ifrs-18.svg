<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D2B45;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0F3459;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A4A6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A73A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A9EC7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3F5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#122E47;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#4A9EC7" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accentGrad)"/>

  <!-- Left: Document icon -->
  <g transform="translate(80, 120)">
    <!-- Main document -->
    <rect x="0" y="0" width="160" height="210" rx="8" fill="url(#cardGrad)" stroke="#1A73A7" stroke-width="1.5" opacity="0.9"/>
    <!-- Document header bar -->
    <rect x="0" y="0" width="160" height="36" rx="8" fill="#1A73A7" opacity="0.8"/>
    <rect x="0" y="28" width="160" height="8" fill="#1A73A7" opacity="0.8"/>
    <!-- IFRS label on header -->
    <text x="80" y="22" text-anchor="middle" fill="white" font-family="Georgia, serif" font-size="13" font-weight="700" letter-spacing="2">IFRS 18</text>
    <!-- Lines of text -->
    <rect x="16" y="54" width="128" height="6" rx="3" fill="#4A9EC7" opacity="0.5"/>
    <rect x="16" y="70" width="100" height="5" rx="2.5" fill="#4A9EC7" opacity="0.3"/>
    <rect x="16" y="84" width="115" height="5" rx="2.5" fill="#4A9EC7" opacity="0.3"/>
    <rect x="16" y="98" width="90" height="5" rx="2.5" fill="#4A9EC7" opacity="0.3"/>
    <!-- Section divider -->
    <rect x="16" y="116" width="128" height="1" fill="#4A9EC7" opacity="0.2"/>
    <!-- More lines -->
    <rect x="16" y="128" width="128" height="5" rx="2.5" fill="#4A9EC7" opacity="0.4"/>
    <rect x="16" y="142" width="108" height="5" rx="2.5" fill="#4A9EC7" opacity="0.3"/>
    <rect x="16" y="156" width="120" height="5" rx="2.5" fill="#4A9EC7" opacity="0.3"/>
    <rect x="16" y="170" width="85" height="5" rx="2.5" fill="#4A9EC7" opacity="0.3"/>
    <!-- Section divider 2 -->
    <rect x="16" y="188" width="128" height="1" fill="#4A9EC7" opacity="0.2"/>
    <rect x="16" y="198" width="100" height="5" rx="2.5" fill="#4A9EC7" opacity="0.3"/>

    <!-- Second document (behind) -->
    <rect x="170" y="20" width="150" height="200" rx="8" fill="url(#cardGrad)" stroke="#1A73A7" stroke-width="1" opacity="0.6" transform="rotate(4, 245, 120)"/>
    <rect x="170" y="20" width="150" height="34" rx="8" fill="#1A73A7" opacity="0.5" transform="rotate(4, 245, 120)"/>
    <rect x="170" y="46" width="150" height="8" fill="#1A73A7" opacity="0.5" transform="rotate(4, 245, 120)"/>
  </g>

  <!-- Center: Main text block -->
  <g transform="translate(290, 100)">
    <!-- IASB tag -->
    <rect x="0" y="0" width="90" height="24" rx="4" fill="#1A73A7" opacity="0.25" stroke="#1A73A7" stroke-width="1"/>
    <text x="45" y="16" text-anchor="middle" fill="#4A9EC7" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">IASB · 2024</text>

    <!-- Main IFRS 18 headline -->
    <text x="0" y="70" fill="white" font-family="Georgia, serif" font-size="52" font-weight="700" letter-spacing="-1" filter="url(#glow)" opacity="0.95">IFRS 18</text>

    <!-- Accent underline -->
    <rect x="0" y="82" width="200" height="3" rx="1.5" fill="url(#accentGrad)"/>

    <!-- Subtitle -->
    <text x="0" y="112" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif" font-size="13" letter-spacing="0.5">Presentación de</text>
    <text x="0" y="130" fill="rgba(255,255,255,0.75)" font-family="Arial, sans-serif" font-size="13" letter-spacing="0.5">Estados Financieros</text>

    <!-- Divider -->
    <rect x="0" y="148" width="240" height="1" fill="#4A9EC7" opacity="0.2"/>

    <!-- Key points -->
    <g transform="translate(0, 162)">
      <circle cx="7" cy="8" r="3" fill="#1A73A7"/>
      <text x="20" y="12" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif" font-size="11">Reemplaza IAS 1</text>
    </g>
    <g transform="translate(0, 184)">
      <circle cx="7" cy="8" r="3" fill="#1A73A7"/>
      <text x="20" y="12" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif" font-size="11">Vigente desde enero 2027</text>
    </g>
    <g transform="translate(0, 206)">
      <circle cx="7" cy="8" r="3" fill="#1A73A7"/>
      <text x="20" y="12" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif" font-size="11">3 categorías obligatorias P&amp;G</text>
    </g>
    <g transform="translate(0, 228)">
      <circle cx="7" cy="8" r="3" fill="#1A73A7"/>
      <text x="20" y="12" fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif" font-size="11">MPM — revelación obligatoria</text>
    </g>
  </g>

  <!-- Right: Three categories diagram -->
  <g transform="translate(570, 100)">
    <text x="100" y="18" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">CATEGORÍAS</text>

    <!-- Operación -->
    <rect x="20" y="30" width="160" height="56" rx="6" fill="#1A73A7" opacity="0.2" stroke="#1A73A7" stroke-width="1.5"/>
    <rect x="20" y="30" width="4" height="56" rx="2" fill="#1A73A7"/>
    <text x="38" y="52" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="700">Operación</text>
    <text x="38" y="68" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="10">Ingresos y gastos core</text>

    <!-- Inversión -->
    <rect x="20" y="98" width="160" height="56" rx="6" fill="#1A73A7" opacity="0.15" stroke="#1A73A7" stroke-width="1" opacity="0.6"/>
    <rect x="20" y="98" width="4" height="56" rx="2" fill="#4A9EC7" opacity="0.7"/>
    <text x="38" y="120" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="700">Inversión</text>
    <text x="38" y="136" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="10">Retorno de activos</text>

    <!-- Financiamiento -->
    <rect x="20" y="166" width="160" height="56" rx="6" fill="#1A73A7" opacity="0.1" stroke="#1A73A7" stroke-width="1" opacity="0.4"/>
    <rect x="20" y="166" width="4" height="56" rx="2" fill="#4A9EC7" opacity="0.4"/>
    <text x="38" y="188" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="700">Financiamiento</text>
    <text x="38" y="204" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="10">Costos de capital</text>

    <!-- Arrow connecting them -->
    <line x1="100" y1="86" x2="100" y2="98" stroke="#1A73A7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <line x1="100" y1="154" x2="100" y2="166" stroke="#1A73A7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

    <!-- New label -->
    <rect x="48" y="240" width="104" height="22" rx="11" fill="#1A73A7" opacity="0.9"/>
    <text x="100" y="255" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="1">NUEVA NORMA</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="440" width="800" height="60" fill="rgba(0,0,0,0.25)"/>
  <text x="80" y="476" fill="rgba(255,255,255,0.5)" font-family="Arial, sans-serif" font-size="12">AB Advisory · Análisis IFRS 18 · Marzo 2026</text>
  <text x="720" y="476" text-anchor="end" fill="#1A73A7" font-family="Arial, sans-serif" font-size="12" font-weight="600">ab-advisory.cl</text>
</svg>
